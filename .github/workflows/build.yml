name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    # ---------- Linux 依赖 ----------
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsfml-dev libxrandr-dev libxcursor-dev libxi-dev

    # ---------- macOS 依赖 ----------
    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: |
        brew install sfml

    # ---------- Windows 依赖 ----------
    - name: Download SFML for Windows (MinGW)
      if: runner.os == 'Windows'
      run: |
        curl -L -o sfml.zip https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-Windows.MinGW.x64.zip
        echo "SFML_DIR=C:\sfml\SFML-3.0.0" >> $env:GITHUB_ENV

    # ---------- 配置 CMake ----------
    - name: Configure CMake (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DEMBED_RESOURCES=ON

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DEMBED_RESOURCES=ON -DSFML_DIR="$env:SFML_DIR\lib\cmake\SFML"

    # ---------- 构建 ----------
    - name: Build
      run: cmake --build build --config Release

    # ---------- 上传 Artifacts ----------
    - name: Upload Linux Artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: JRFirstGame-Linux
        path: build/JRFirstGame

    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: JRFirstGame-Windows
        path: build/Release/JRFirstGame.exe

    - name: Upload macOS Artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: JRFirstGame-macOS
        path: build/JRFirstGame.app