name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-Windows.VS2022.x64.zip
            sfml_dir: SFML-3.0.2
            cmake_generator: "Visual Studio 17 2022"
            artifact_name: JRFirstGame-Windows
          - os: ubuntu-latest
            sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-Linux.GCC.tar.gz
            sfml_dir: SFML-3.0.2
            cmake_generator: "Unix Makefiles"
            artifact_name: JRFirstGame-Linux
          - os: macos-latest
            sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-macOS.arm64.tar.gz
            sfml_dir: SFML-3.0.2
            cmake_generator: "Unix Makefiles"
            artifact_name: JRFirstGame-macOS-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxrandr-dev libxcursor-dev libxi-dev libgl1-mesa-dev libflac-dev libvorbis-dev libopenal-dev

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: brew install freetype

    - name: Download SFML (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "${{ matrix.sfml_url }}" -OutFile sfml.zip
        Expand-Archive -Path sfml.zip -DestinationPath .
        $sfmlPath = "$pwd\${{ matrix.sfml_dir }}"
        echo "SFML_DIR=$sfmlPath/lib/cmake/SFML" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "SFML_BIN_DIR=$sfmlPath/bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Download SFML (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        curl -L "${{ matrix.sfml_url }}" -o sfml.tar.gz
        tar -xzf sfml.tar.gz
        sfmlPath="$(pwd)/${{ matrix.sfml_dir }}"
        echo "SFML_DIR=$sfmlPath/lib/cmake/SFML" >> $GITHUB_ENV
        echo "SFML_LIB_DIR=$sfmlPath/lib" >> $GITHUB_ENV

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -G "${{ matrix.cmake_generator }}" `
              -DCMAKE_BUILD_TYPE=Release `
              -DEMBED_RESOURCES=ON `
              -DSFML_DIR="$env:SFML_DIR" `
              -DSFML_BIN_DIR="$env:SFML_BIN_DIR"

    - name: Configure CMake (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cmake -B build -G "${{ matrix.cmake_generator }}" \
              -DCMAKE_BUILD_TYPE=Release \
              -DEMBED_RESOURCES=ON \
              -DSFML_DIR="$SFML_DIR" \
              -DSFML_LIB_DIR="$SFML_LIB_DIR"

    - name: Build
      run: cmake --build build --config Release

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # 删除可能存在的数据库文件
        Get-ChildItem -Path build/Release -Filter *.db -Recurse | Remove-Item -Force
        Get-ChildItem -Path build/Release -Filter *.db-journal -Recurse | Remove-Item -Force
        # 压缩剩余文件
        Compress-Archive -Path build/Release/* -DestinationPath ${{ matrix.artifact_name }}.zip -Force
    
    - name: Package (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p package
        cp build/JRFirstGame package/
        cp $SFML_LIB_DIR/libsfml-*.so* package/ || true
        tar -czf ${{ matrix.artifact_name }}.tar.gz -C package .

    - name: Package (macOS)
      if: runner.os == 'macOS'
      run: |
        ditto -c -k --sequesterRsrc --keepParent build/JRFirstGame.app ${{ matrix.artifact_name }}.zip

    - name: Upload Artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.zip

    - name: Upload Artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.tar.gz

    - name: Upload Artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            JRFirstGame-Windows/JRFirstGame-Windows.zip
            JRFirstGame-Linux/JRFirstGame-Linux.tar.gz
            JRFirstGame-macOS-arm64/JRFirstGame-macOS-arm64.zip
          generate_release_notes: true