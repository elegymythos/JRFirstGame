name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-Linux.GCC.tar.gz
            sfml_dir: SFML-3.0.2
            cmake_generator: "Unix Makefiles"
            artifact_name: JRFirstGame-Linux
            artifact_path: build/JRFirstGame

          - os: windows-latest
            sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-Windows.VS2022.x64.zip
            sfml_dir: SFML-3.0.2
            cmake_generator: "Visual Studio 17 2022"
            artifact_name: JRFirstGame-Windows
            artifact_path: build/Release/         # 整个目录，包含 exe 和 dll

          - os: macos-latest
            sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-macOS.arm64.tar.gz
            sfml_dir: SFML-3.0.2
            cmake_generator: "Unix Makefiles"
            artifact_name: JRFirstGame-macOS-arm64
            artifact_path: build/JRFirstGame.app

          # - os: macos-13
          #   sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-macOS.x64.tar.gz
          #   sfml_dir: SFML-3.0.2
          #   cmake_generator: "Unix Makefiles"
          #   artifact_name: JRFirstGame-macOS-x64
          #   artifact_path: build/JRFirstGame.app

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxrandr-dev libxcursor-dev libxi-dev libgl1-mesa-dev

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: brew install freetype

    - name: Download SFML (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "${{ matrix.sfml_url }}" -OutFile sfml.zip
        Expand-Archive -Path sfml.zip -DestinationPath .
        $sfmlPath = "$pwd\${{ matrix.sfml_dir }}"
        echo "SFML_DIR=$sfmlPath/lib/cmake/SFML" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "SFML_BIN_DIR=$sfmlPath/bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Download SFML (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        curl -L "${{ matrix.sfml_url }}" -o sfml.tar.gz
        tar -xzf sfml.tar.gz
        sfmlPath="$(pwd)/${{ matrix.sfml_dir }}"
        echo "SFML_DIR=$sfmlPath/lib/cmake/SFML" >> $GITHUB_ENV
        echo "SFML_LIB_DIR=$sfmlPath/lib" >> $GITHUB_ENV

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -G "${{ matrix.cmake_generator }}" `
              -DCMAKE_BUILD_TYPE=Release `
              -DEMBED_RESOURCES=ON `
              -DSFML_DIR="$env:SFML_DIR" `
              -DSFML_BIN_DIR="$env:SFML_BIN_DIR"

    - name: Configure CMake (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cmake -B build -G "${{ matrix.cmake_generator }}" \
              -DCMAKE_BUILD_TYPE=Release \
              -DEMBED_RESOURCES=ON \
              -DSFML_DIR="$SFML_DIR" \
              -DSFML_LIB_DIR="$SFML_LIB_DIR"

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Package and Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            JRFirstGame-Windows/*.{exe,dll}
            JRFirstGame-Linux/JRFirstGame
            JRFirstGame-macOS-arm64/JRFirstGame.app/**
          generate_release_notes: true