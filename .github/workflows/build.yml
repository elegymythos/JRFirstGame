name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-Linux.GCC.tar.gz
            sfml_dir: SFML-3.0.2
            cmake_generator: "Unix Makefiles"
            artifact_name: JRFirstGame-Linux
            artifact_path: build/JRFirstGame

          - os: windows-latest
            sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-Windows.VS2022.x64.zip
            sfml_dir: SFML-3.0.2
            cmake_generator: "Visual Studio 17 2022"
            artifact_name: JRFirstGame-Windows
            artifact_path: build/Release/JRFirstGame.exe

          - os: macos-latest
            sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-macOS.arm64.tar.gz
            sfml_dir: SFML-3.0.2
            cmake_generator: "Unix Makefiles"
            artifact_name: JRFirstGame-macOS
            artifact_path: build/JRFirstGame.app

          # - os: macos-13
          #   sfml_url: https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-macOS.x64.tar.gz
          #   sfml_dir: SFML-3.0.2
          #   cmake_generator: "Unix Makefiles"
          #   artifact_name: JRFirstGame-macOS-x64
          #   artifact_path: build/JRFirstGame.app

    steps:
    - uses: actions/checkout@v4

    # ---------- 安装系统依赖 ----------
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxrandr-dev libxcursor-dev libxi-dev libgl1-mesa-dev

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: |
        brew install freetype

    # ---------- 下载并解压 SFML 预编译包 ----------
    # ---------- Windows ----------
    - name: Download SFML (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "${{ matrix.sfml_url }}" -OutFile sfml.zip
        Expand-Archive -Path sfml.zip -DestinationPath .
        $sfmlPath = "$pwd\${{ matrix.sfml_dir }}"
        echo "SFML_DIR=$sfmlPath/lib/cmake/SFML" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "SFML_BIN_DIR=$sfmlPath/bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    # ---------- Linux ----------
    - name: Download SFML (Linux)
      if: runner.os == 'Linux'
      run: |
        curl -L "${{ matrix.sfml_url }}" -o sfml.tar.gz
        tar -xzf sfml.tar.gz
        sfmlPath="$(pwd)/${{ matrix.sfml_dir }}"
        echo "SFML_DIR=$sfmlPath/lib/cmake/SFML" >> $GITHUB_ENV
        echo "SFML_LIB_DIR=$sfmlPath/lib" >> $GITHUB_ENV

    # ---------- macOS ----------
    - name: Download SFML (macOS)
      if: runner.os == 'macOS'
      run: |
        curl -L "${{ matrix.sfml_url }}" -o sfml.tar.gz
        tar -xzf sfml.tar.gz
        sfmlPath="$(pwd)/${{ matrix.sfml_dir }}"
        echo "SFML_DIR=$sfmlPath/lib/cmake/SFML" >> $GITHUB_ENV
        echo "SFML_LIB_DIR=$sfmlPath/lib" >> $GITHUB_ENV

    # ---------- 配置 CMake ----------
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -G "${{ matrix.cmake_generator }}" `
              -DCMAKE_BUILD_TYPE=Release `
              -DEMBED_RESOURCES=ON `
              -DSFML_DIR="${{ env.SFML_DIR }}" `
              -DSFML_BIN_DIR="${{ env.SFML_BIN_DIR }}"

    - name: Configure CMake (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cmake -B build -G "${{ matrix.cmake_generator }}" \
              -DCMAKE_BUILD_TYPE=Release \
              -DEMBED_RESOURCES=ON \
              -DSFML_DIR="${{ env.SFML_DIR }}" \
              -DSFML_LIB_DIR="${{ env.SFML_LIB_DIR }}"
    # ---------- 构建 ----------
    - name: Build
      run: cmake --build build --config Release

    # ---------- 上传 Artifacts ----------
    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: build/Release/     

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}

  release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')   # 仅当推送 v 开头的标签时触发
    permissions:
      contents: write

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4

      - name: 打包 Windows 为 zip
        run: |
          cd JRFirstGame-Windows
          zip -r ../JRFirstGame-Windows.zip .

      - name: 打包 Linux 为 tar.gz
        run: |
          cd JRFirstGame-Linux
          tar -czf ../JRFirstGame-Linux.tar.gz JRFirstGame

      - name: 打包 macOS (arm64)
        run: |
          cd JRFirstGame-macOS-arm64
          zip -r ../JRFirstGame-macOS-arm64.app.zip JRFirstGame.app

      - name: 打包 macOS (x64)
        run: |
          cd JRFirstGame-macOS-x64
          zip -r ../JRFirstGame-macOS-x64.app.zip JRFirstGame.app

      - name: 创建 Release 并上传资产
        uses: softprops/action-gh-release@v2
        with:
          files: |
            JRFirstGame-Windows.zip
            JRFirstGame-Linux.tar.gz
            JRFirstGame-macOS-arm64.app.zip
            JRFirstGame-macOS-x64.app.zip
          generate_release_notes: true